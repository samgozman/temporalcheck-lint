# Example consumer config — also used to self-lint this repo via `make run`.
# In a project you want to lint, this lives at the repo root and is run with
# the custom binary: `./bin/custom-gcl run`.
version: "2"

linters:
  default: standard
  enable:
    - temporalcheck
  settings:
    custom:
      temporalcheck:
        type: module
        description: Static checks for Temporal Go SDK usage.
        original-url: github.com/samgozman/temporalcheck-lint
        settings:
          # Settings are grouped per analyzer.
          execargs:
            # Turn the analyzer off entirely without unwiring the plugin
            # (default false). Useful once more analyzers share this plugin.
            disabled: false
            # Verify argument types in addition to argument count (default false).
            # Opt in; arity is always checked and is the false-positive-free part.
            strict-types: true
            # Flag value-vs-pointer mismatches (T vs *T, []T vs []*T), which the
            # DataConverter otherwise serializes identically (default false).
            strict-pointers: true
            # Flag passing one struct type where a different struct is wanted: the
            # DataConverter serializes by field name, so distinct structs can
            # round-trip while silently dropping/zero-filling fields (default false).
            strict-struct-shape: true
            # Check the matcher arity of testsuite mock setups, OnActivity and
            # OnWorkflow (default false). The matchers must cover every parameter,
            # including the injected context, so the count differs from Execute* by
            # one; only arity is checked since matchers are opaque.
            strict-tests: true
          stringtarget:
            # Flag Execute* calls that name the target by its registered string
            # instead of passing the function reference, which can't be checked
            # statically and blinds execargs (default false). Opt in to be nudged
            # toward a function reference that execargs can verify.
            enabled: true
            # Flag testsuite mock setups (OnActivity/OnWorkflow) whose target is
            # named by string (default false). Independent of enabled.
            strict-tests: true
          optionsdiscard:
            # Flag workflow.WithActivityOptions/WithLocalActivityOptions/
            # WithChildOptions calls whose returned context is discarded, so the
            # options silently never apply. On by default; set true to turn it off.
            disabled: false
