# Example consumer config — also used to self-lint this repo via `make run`.
# In a project you want to lint, this lives at the repo root and is run with
# the custom binary: `./bin/custom-gcl run`.
version: "2"

linters:
  default: standard
  enable:
    - temporalcheck
  settings:
    custom:
      temporalcheck:
        type: module
        description: Static checks for Temporal Go SDK usage.
        original-url: github.com/samgozman/temporalcheck-lint
        settings:
          # Settings are grouped per analyzer.
          execargs:
            # Turn the analyzer off entirely without unwiring the plugin
            # (default false). Useful once more analyzers share this plugin.
            disabled: false
            # Verify argument types in addition to argument count (default false).
            # Opt in; arity is always checked and is the false-positive-free part.
            strict-types: true
            # Flag value-vs-pointer mismatches (T vs *T, []T vs []*T), which the
            # DataConverter otherwise serializes identically (default false).
            strict-pointers: true
            # Flag passing one struct type where a different struct is wanted: the
            # DataConverter serializes by field name, so distinct structs can
            # round-trip while silently dropping/zero-filling fields (default false).
            strict-struct-shape: true
            # Check the matcher arity of testsuite mock setups, OnActivity and
            # OnWorkflow (default false). The matchers must cover every parameter,
            # including the injected context, so the count differs from Execute* by
            # one; only arity is checked since matchers are opaque.
            strict-tests: true
          stringtarget:
            # Flag Execute* calls that name the target by its registered string
            # instead of passing the function reference, which can't be checked
            # statically and blinds execargs (default false). Opt in to be nudged
            # toward a function reference that execargs can verify.
            enabled: true
            # Flag testsuite mock setups (OnActivity/OnWorkflow) whose target is
            # named by string (default false). Independent of enabled.
            strict-tests: true
          optionsdiscard:
            # Flag workflow.WithActivityOptions/WithLocalActivityOptions/
            # WithChildOptions calls whose returned context is discarded, so the
            # options silently never apply. On by default; set true to turn it off.
            disabled: false
          activitytimeout:
            # Flag workflow.ActivityOptions/LocalActivityOptions literals that set
            # no required timeout (StartToCloseTimeout or ScheduleToCloseTimeout),
            # which Temporal rejects at run time. On by default; set true to turn
            # it off.
            disabled: false
          futureget:
            # Flag a .Get on a workflow.Future/ChildWorkflowFuture/
            # converter.EncodedValue whose returned error is discarded (a bare
            # statement or `_ =`), silently swallowing an activity, child-workflow
            # or decode failure. On by default; set true to turn it off.
            disabled: false
          lossynumber:
            # Flag interface{}/any, map[string]any and []any as a top-level
            # activity/workflow parameter or return type. Temporal's JSON converter
            # decodes numbers as float64, so an int64 past 2^53 silently loses
            # precision. On by default; set true to turn it off (e.g. for a custom
            # converter that preserves integer precision).
            disabled: false
          nonserializable:
            # Flag chan and func types as a top-level activity/workflow parameter or
            # return type: Temporal's DataConverter cannot serialize them, so the call
            # fails at run time. On by default; set true to turn it off.
            disabled: false
            # Opt in to also flagging a struct that has fields but none exported (and
            # does not implement json.Marshaler), which JSON encodes to {} and so
            # silently drops its data (default false).
            empty-struct: true
          continueasnew:
            # Flag a workflow.NewContinueAsNewError result that is discarded (a bare
            # statement or `_ =`) instead of returned, so the workflow silently ends
            # instead of continuing as new. On by default; set true to turn it off.
            disabled: false
          sensitiveargs:
            # Flag activity/workflow parameters (and exported struct fields) whose
            # name matches a sensitive-data pattern, since Temporal records arguments
            # in durable workflow history. A name heuristic, so it is off by default;
            # set enabled true to opt in. A useful first line of defence for keeping
            # secrets and PII out of history.
            enabled: true
            # Regexp matched (unanchored) against parameter and exported-field names.
            # Omit to use the default: (?i)cvv|pan|card.?number|password|secret|ssn|token
            pattern: "(?i)cvv|pan|card.?number|password|secret|ssn|token"
          optionscontext:
            # Flag a workflow.Execute{Activity,LocalActivity,ChildWorkflow} call whose
            # context was configured with a conflicting With*Options helper in the same
            # function (e.g. WithChildOptions then ExecuteActivity), so the options it
            # reads never apply. Fires only on a seen contradiction, never on absence,
            # so it is on by default; set true to turn it off.
            disabled: false
